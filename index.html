on is taking shape. In schools where classrooms sometimes serve as community meeting halls, and where students walk up to two hours each morning to reach their desks, young people are discovering that their rural roots are not a disadvantage — they are a foundation.","For decades, migration to the cities has drained mountain communities of their youngest and most energetic members. Parents encouraged their children to leave, believing that opportunity existed only in urban centres. \"My grandmother told me that staying meant accepting a smaller life,\" says Valentina, a seventeen-year-old student from a rural municipio in southern Antioquia. \"But I have started to question that idea.\"","That questioning has been encouraged by a growing movement of educators who believe that rural schools can offer something urban institutions cannot: a direct connection between learning and the land. In several communities across the region, teachers have begun designing lessons around the agricultural cycles of their areas, incorporating mathematics into crop measurement, biology into soil analysis, and language skills into the reading of environmental reports.","\"We were invisible,\" admits Carlos, eighteen. \"Now we are heard.\" Technology has played an unexpected role in this transformation. Where internet connections were once unreliable or entirely absent, community-funded solar panels and satellite receivers have changed the landscape of learning. Students who once felt isolated now participate in virtual exchanges with peers from other countries, sharing their experiences of mountain life and receiving, in return, perspectives they had never considered.","Critics argue that this model romanticises poverty and discourages young people from pursuing professional careers in the city. They warn that celebrating rural life without improving rural infrastructure creates a beautiful trap. However, educators like María Esperanza Reyes, who has taught in mountain communities for over twenty years, insist that the goal is not to keep students in one place, but to give them the confidence to choose. \"A young person who knows who they are,\" she says, \"can thrive anywhere.\"","The results, while still modest, are encouraging. Dropout rates in some participating schools have fallen significantly. Students report higher levels of motivation and a clearer sense of purpose. Several graduates have returned to their communities after completing university degrees, bringing with them skills in agronomy, technology, and law — tools that their villages genuinely need.","The story of rural education in the mountains is far from finished. The challenges of funding, connectivity, and policy remain formidable. Yet in the quiet persistence of students who rise before dawn to climb towards their classrooms, and in the determination of teachers who stay when they could easily leave, there is something worth watching closely — a generation that refuses to choose between its roots and its wings."],tr=[{id:1,question:"What is the main purpose of this article?",options:[{label:"A",text:"To criticize the Colombian government for neglecting rural schools."},{label:"B",text:"To report on how rural youth in Antioquia are redefining education and community life."},{label:"C",text:"To argue that all students in mountain schools should move to cities."},{label:"D",text:"To present statistics about dropout rates in rural Colombia."}],correct:"B",explanation:"The article covers the innovative educational movement developing in mountain schools and the new perspective of rural youth."},{id:2,question:"According to the article, what did parents traditionally encourage their children to do?",options:[{label:"A",text:"Stay in their communities and learn agricultural techniques."},{label:"B",text:"Attend rural schools that connected learning to the land."},{label:"C",text:"Leave for cities, where they believed opportunities were greater."},{label:"D",text:"Travel abroad through international exchange programmes."}],correct:"C",explanation:"The text states that parents encouraged their children to leave, believing that opportunity existed only in urban centres."},{id:3,question:"The phrase \"a different kind of education is taking shape\" in the first paragraph suggests that…",options:[{label:"A",text:"Rural schools are replacing academic subjects with farming lessons."},{label:"B",text:"An innovative and unconventional approach to learning is developing in the mountains."},{label:"C",text:"The government has introduced new national education reforms in rural areas."},{label:"D",text:"Mountain communities are constructing larger school buildings with new technology."}],correct:"B",explanation:"The phrase announces a positive transformation — not a replacement of traditional education, but a reimagining of what school can mean in a rural context."},{id:4,question:"What role has technology played in rural mountain schools according to the article?",options:[{label:"A",text:"It has completely replaced traditional face-to-face teaching in remote areas."},{label:"B",text:"It has connected rural students with peers from other countries through virtual exchanges."},{label:"C",text:"It has made rural schools as modern and well-equipped as urban institutions."},{label:"D",text:"It has provided direct funding for new school infrastructure through grants."}],correct:"B",explanation:"Solar panels and satellite receivers brought connectivity, and students now participate in virtual exchanges with international peers — technology broke their isolation."},{id:5,question:"What does Carlos mean when he says \"We were invisible. Now we are heard\"?",options:[{label:"A",text:"His school was too remote for government officials or visitors to reach."},{label:"B",text:"Technology has given rural students a voice and presence in broader conversations."},{label:"C",text:"City students used to look down on and disrespect those from the mountains."},{label:"D",text:"He is pointing out the ongoing lack of reliable internet in his community."}],correct:"B",explanation:"Carlos contrasts past invisibility with present recognition — digital connectivity has made rural students visible and audible to the wider world."},{id:6,question:"What is the critics' main concern about the rural education model described?",options:[{label:"A",text:"That technology is making rural students dangerously dependent on outside support."},{label:"B",text:"That teachers working in mountain schools lack the proper professional qualifications."},{label:"C",text:"That glorifying rural life without improving infrastructure may limit students' real futures."},{label:"D",text:"That virtual exchanges with foreign students distract from academic content."}],correct:"C",explanation:"Critics warn that romanticising rural life without real structural improvements creates what they call a beautiful trap — attractive but ultimately limiting."},{id:7,question:"What does teacher María Esperanza Reyes believe is the real goal of rural education?",options:[{label:"A",text:"To prepare students specifically for agricultural and environmental careers."},{label:"B",text:"To ensure graduates stay in their communities and support local economies."},{label:"C",text:"To give students a strong enough sense of identity to succeed wherever they choose."},{label:"D",text:"To demonstrate that rural schools can outperform urban institutions academically."}],correct:"C",explanation:"Reyes states that a young person who knows who they are can thrive anywhere — the goal is identity and confidence, not a specific geographic destination."},{id:8,question:"Which of the following best describes the tone of the final paragraph?",options:[{label:"A",text:"Pessimistic, because the article admits that the problems of rural education remain unsolved."},{label:"B",text:"Cautiously hopeful, acknowledging serious challenges while recognising meaningful progress."},{label:"C",text:"Celebratory, declaring the complete and definitive success of the rural education movement."},{label:"D",text:"Critical, warning readers about the dangers of romanticising poverty and rural conditions."}],correct:"B",explanation:"The final paragraph admits that challenges remain formidable, yet highlights the inspiring determination of students and teachers — a balanced and hopeful note."}],ta=["migration","isolated","encouraged","dropout","persistent","foundation"],tl=[{id:1,before:"For decades,",after:"to the cities has drained mountain communities of their youngest members.",correct:"migration"},{id:2,before:"Students who once felt",after:"now participate in virtual exchanges with peers from other countries.",correct:"isolated"},{id:3,before:"Parents",after:"their children to leave, believing that opportunity existed only in urban centres.",correct:"encouraged"},{id:4,before:"According to the article,",after:"rates in some participating schools have fallen significantly.",correct:"dropout"}],to=[{id:1,question:"The title 'Roots and Wings' functions in the article primarily as…",options:[{label:"A",text:"A reference to the trees and birds that are typical of Antioquia's mountain landscapes."},{label:"B",text:"A metaphor suggesting that rural identity and personal freedom are compatible, not contradictory."},{label:"C",text:"A symbol of the inevitable migration of young people from rural communities to urban centres."},{label:"D",text:"An ironic comment on the impossibility of staying connected to one's cultural origins."}],correct:"B",explanation:"\"Roots\" represent cultural identity and origin; \"wings\" represent aspiration and the freedom to move. The title argues these are not opposites but complementary strengths."},{id:2,question:"The structure of this article can best be described as…",options:[{label:"A",text:"A chronological account tracing the personal development of a single rural student over time."},{label:"B",text:"A balanced journalistic report presenting a social phenomenon, real examples, a counterargument, and a conclusion."},{label:"C",text:"A personal essay in which the journalist shares their own experience of living in a rural community."},{label:"D",text:"A series of independent and unrelated testimonies gathered from students and teachers across Colombia."}],correct:"B",explanation:"The article follows classic journalistic structure: it introduces a social phenomenon, provides evidence through voices and examples, presents a counterargument, and ends with a reflective conclusion."},{id:3,question:"Valentina's statement — \"I have started to question that idea\" — functions in the text primarily as…",options:[{label:"A",text:"Evidence that rural youth are confused and uncertain about what direction their lives should take."},{label:"B",text:"A personal anecdote that introduces the central theme of young people challenging inherited beliefs about opportunity."},{label:"C",text:"A direct criticism of grandmothers and older generations who discourage young people's ambitions."},{label:"D",text:"A structural transition connecting the section about migration to the section about technology in schools."}],correct:"B",explanation:"Valentina's doubt is not confusion — it is the beginning of critical thinking about received wisdom, which is precisely the kind of transformation the article celebrates as its central theme."},{id:4,question:"The inclusion of the critics' perspective in paragraph five serves primarily to…",options:[{label:"A",text:"Undermine the positive message that the article has been building throughout."},{label:"B",text:"Prove that rural education models are fundamentally flawed and should not be celebrated."},{label:"C",text:"Add journalistic balance and strengthen the article's credibility by presenting an opposing viewpoint."},{label:"D",text:"Discourage ordinary readers from supporting rural education programmes in their communities."}],correct:"C",explanation:"Including criticism makes the article more credible and trustworthy. A report that presents only one side loses its journalistic authority. The counterargument is a deliberate structural choice that strengthens, not weakens, the text."},{id:5,question:"What does the phrase \"a beautiful trap\" suggest about the critics' view of the rural education model?",options:[{label:"A",text:"That rural communities have created aesthetically attractive and well-designed school buildings."},{label:"B",text:"That celebrating rural life without addressing structural problems may restrict students' real freedom of choice."},{label:"C",text:"That the use of technology in rural schools creates a misleading illusion of equal opportunity."},{label:"D",text:"That young people who return to their communities after finishing university are making a strategic error."}],correct:"B",explanation:"\"Beautiful\" acknowledges the genuine appeal and emotional power of the model; \"trap\" introduces the risk. Together they describe something that may look liberating but could actually restrict the range of real options available to students."},{id:6,question:"\"A generation that refuses to choose between its roots and its wings\" — this final image is best interpreted as…",options:[{label:"A",text:"An ironic warning about the dangerously unrealistic ambitions of young people raised in rural isolation."},{label:"B",text:"A direct criticism of young people who avoid committing to clear and difficult decisions about their futures."},{label:"C",text:"A hopeful portrait of a generation capable of embracing both their cultural identity and their aspirations simultaneously."},{label:"D",text:"A political argument defending specific government policies against migration from rural areas of Colombia."}],correct:"C",explanation:"The closing image is one of wholeness and agency — a generation that refuses the false choice between who they are and what they want to become. It is the article's most powerful statement of hope."},{id:7,question:"This
